name: Publish packages

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to release from'
        required: true
        type: string
      dry-run:
        description: 'Run in dry-run mode without actually publishing packages'
        required: false
        type: boolean
        default: false
      github-release:
        description: 'Create a GitHub release after publishing'
        required: false
        type: boolean
        default: true
      dist-tag:
        description: 'npm dist tag to publish to'
        required: false
        type: string
        default: 'latest'
      filter:
        description: 'pnpm-style package filter, for example @base-ui/utils'
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing tags and creating releases
      id-token: write # Required for provenance
    environment:
      name: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0 # Fetch full history for proper git operations
      - name: Prepare for publishing
        uses: mui/mui-public/.github/actions/publish-prepare@1d16a59f8f43b3527070678bb7d872c32e0a6cac
      - name: Publish packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry-run }}
          GITHUB_RELEASE: ${{ inputs.github-release }}
          DIST_TAG: ${{ inputs.dist-tag }}
          FILTER: ${{ inputs.filter }}
        run: |
          # Build common flags
          ARGS=()
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "$GITHUB_RELEASE" = "true" ]; then
            ARGS+=(--github-release)
          fi
          if [ -n "$DIST_TAG" ]; then
            ARGS+=(--tag "$DIST_TAG")
          fi
          if [ -n "$FILTER" ]; then
            ARGS+=(--filter "$FILTER")
          fi

          pnpm code-infra publish --ci "${ARGS[@]}"
